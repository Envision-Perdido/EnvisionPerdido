name: Code Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Ruff Linting
    runs-on: ubuntu-latest
    env:
      RUFF_TARGETS: >-
        scripts/Envision_Perdido_DataCollection.py
        scripts/wren_haven_scraper.py
        scripts/pipeline/wordpress_uploader.py
        scripts/tooling/event_normalizer.py
        tests/unit/test_deduplication.py
        tests/unit/test_wordpress_uploader.py
        tests/unit/test_event_normalizer.py
        tests/unit/test_perdido_scraper.py
        tests/unit/test_wren_haven_scraper.py
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      
      - name: Run Ruff linter
        run: |
          ruff check $RUFF_TARGETS --output-format=github
      
      - name: Run Ruff formatter check
        run: |
          ruff format --check $RUFF_TARGETS
