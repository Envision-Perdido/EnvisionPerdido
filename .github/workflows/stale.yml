name: Stale Issue/PR Manager

on:
  schedule:
    # Daily at midnight UTC
    - cron: '0 0 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  stale:
    name: Manage Stale Issues/PRs
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      pull-requests: write
    
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 60 days and will be closed in 30 days if no activity occurs.'
          stale-pr-message: 'This PR has been inactive for 60 days and will be closed in 30 days if no activity occurs.'
          close-issue-message: 'This issue was closed due to inactivity.'
          close-pr-message: 'This PR was closed due to inactivity.'
          days-before-stale: 60
          days-before-close: 30
          exempt-issue-labels: 'pinned,security,critical'
          exempt-pr-labels: 'pinned,security'
